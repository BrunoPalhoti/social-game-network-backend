services:
  postgres:
    image: postgres:16-alpine
    container_name: social-game-network-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Porta no host alternativa para evitar conflito com Postgres local.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamerverse -d gamerverse"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-game-network-backend
    environment:
      PORT: ${PORT}
      # Caso você adicione TypeORM/Prisma depois, já deixamos a URL pronta.
      DATABASE_URL: ${DATABASE_URL}
      RAWG_API_KEY: ${RAWG_API_KEY}
    # npm ci: o volume anónimo /app/node_modules sobrepõe o da imagem; sem isto,
    # dependências novas (ex.: bcrypt) ficam em falta até o volume ser recriado.
    command:
      ["sh", "-c", "npm ci && npm run migration:run && npm run start:dev"]
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      # Para o seed/população dos mocks: disponibiliza mockUsers.json do frontend no container do backend.
      - ../social-game-network-frontend/src/data/mockUsers.json:/app/mockUsers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

